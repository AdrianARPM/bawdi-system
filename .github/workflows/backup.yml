# .github/workflows/backup.yml
# Backup otomatis database BAWDI (pg_dump penuh) — berjalan di GitHub, bukan di server Anda.
#
# CARA PASANG (sekali saja, tanpa terminal):
# 1. Supabase → Connect → Session pooler → Type: URI. Salin.
#    Ganti [YOUR-PASSWORD] dengan password database (tanpa kurung siku).
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Name : SUPABASE_DB_URL
#    Value: (connection string Session pooler tadi)
# 3. Simpan file ini di .github/workflows/backup.yml (di ROOT repo) → commit.
# 4. Uji: tab Actions → "Backup Database Harian" → Run workflow.
#
# Hasil backup = artifact di tab Actions (privat, 30 hari). PASTIKAN REPO PRIVATE.

name: Backup Database Harian

on:
  schedule:
    - cron: '0 20 * * *'   # 20:00 UTC = 03:00 WIB setiap hari
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    # Jalankan seluruh job DI DALAM image PostgreSQL 17 resmi.
    # Dengan begini pg_dump PASTI versi 17 — tak bergantung instalasi apt.
    container:
      image: postgres:17
    steps:
      - name: Cek versi pg_dump (harus 17.x)
        run: pg_dump --version

      - name: Jalankan pg_dump
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TANGGAL=$(date +%Y-%m-%d)
          pg_dump "$DB_URL" \
            --no-owner --no-privileges \
            --format=custom \
            --file="bawdi_backup_${TANGGAL}.dump"
          ls -lh bawdi_backup_*.dump

      - name: Simpan sebagai artifact (30 hari)
        uses: actions/upload-artifact@v4
        with:
          name: bawdi-backup-${{ github.run_id }}
          path: bawdi_backup_*.dump
          retention-days: 30
